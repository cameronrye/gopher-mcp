name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Least-privilege default; jobs needing more must opt in explicitly.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run tests
        run: uv run pytest

  gemini-tests:
    name: Gemini Protocol Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run Gemini-specific tests
        # --no-cov: this runs only the Gemini subset, so it cannot meet the
        # project-wide --cov-fail-under gate in addopts. The full matrix job
        # enforces coverage; here we only care that the subset passes.
        run: |
          uv run pytest tests/test_gemini_client.py tests/test_gemini_models.py tests/test_gemini_status.py tests/test_gemini_tls.py tests/test_gemini_utils.py tests/test_security.py tests/test_performance.py -v --tb=short -m "not slow" --no-cov

      - name: Test Gemini client functionality
        run: |
          uv run python -c "
          import asyncio
          from src.gopher_mcp.server import get_client_manager

          async def test_gemini():
              manager = await get_client_manager()
              client = await manager.get_gemini_client()
              print('Gemini client created successfully')
              await client.close()

          asyncio.run(test_gemini())
          "

      - name: Validate Gemini configuration
        run: |
          export GEMINI_TOFU_ENABLED=true
          export GEMINI_CLIENT_CERTS_ENABLED=true
          uv run python -c "
          import asyncio
          from src.gopher_mcp.server import get_client_manager

          async def test_config():
              manager = await get_client_manager()
              client = await manager.get_gemini_client()
              print('Gemini configuration validated')
              await client.close()

          asyncio.run(test_config())
          "

  lint:
    name: Lint and type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run ruff linting
        run: uv run ruff check .

      - name: Run ruff formatting check
        run: uv run ruff format --check .

      - name: Run mypy type checking
        run: uv run mypy src

  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run bandit security linting
        run: uv run bandit -r src/ -f json -o bandit-report.json

      - name: Run pip-audit dependency scan
        run: uv run pip-audit --format json --output pip-audit-report.json

      - name: Upload security reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json

  docs:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --locked --extra docs

      - name: Build documentation
        run: uv run mkdocs build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: documentation
          path: site/
